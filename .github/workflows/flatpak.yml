name: Flatpak

on:
  push:
    branches: [master]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "flatpak/**"
      - ".github/workflows/flatpak.yml"
  pull_request:
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "flatpak/**"
      - ".github/workflows/flatpak.yml"

jobs:
  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    # freedesktop-24.08 is the newest tag this action's image currently
    # offers (checked 2026-07-09; no -25.08 tag exists yet), even though the
    # manifest targets runtime-version 25.08 — the action installs whatever
    # runtime the manifest specifies from Flathub at build time regardless
    # of this base image's own tag, so the mismatch shouldn't matter, but
    # bump this once a matching tag exists.
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate cargo-sources.json
        run: |
          # Use the in-tree, pinned generator (flatpak/flatpak-cargo-generator.py)
          # — no live download of a mutable branch.
          if command -v apt-get >/dev/null; then
            apt-get update -qq
            apt-get install -y -qq python3-aiohttp python3-yaml python3-tomlkit
          elif command -v dnf >/dev/null; then
            dnf install -y python3-aiohttp python3-pyyaml python3-tomlkit
          else
            python3 -m ensurepip --upgrade
            python3 -m pip install aiohttp PyYAML tomlkit
          fi
          python3 flatpak/flatpak-cargo-generator.py Cargo.lock -o flatpak/cargo-sources.json

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: cosmic-camera.flatpak
          manifest-path: flatpak/io.github.rclinux.CosmicCamera.yml
          cache-key: flatpak-builder-${{ github.sha }}
